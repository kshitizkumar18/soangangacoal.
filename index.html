<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soan Ganga Coal Mining Pvt. Ltd.</title>
    <style>
        body { background-color: #12161A; color: #ECEFF1; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        header { border-bottom: 2px solid #CCFF00; padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1A2026 0%, #12161A 100%); }
        h1 { color: #FFFFFF; margin: 0; font-size: 2.5rem; }
        h2 { color: #FFFFFF; border-bottom: 1px solid #2C353F; padding-bottom: 10px; margin-top: 40px;}
        .highlight { color: #CCFF00; }
        .partner { color: #FF5E00; font-weight: bold; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .leadership-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .leader-card { background-color: #1A2026; border-left: 4px solid #CCFF00; padding: 20px; border-radius: 4px; }
        .leader-title { color: #90A4AE; font-size: 0.9rem; text-transform: uppercase; }
        .leader-name { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .stat-card { background-color: #1A2026; border: 1px solid #2C353F; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #CCFF00; }
        .stat-label { font-size: 0.85rem; text-transform: uppercase; color: #90A4AE; }
    </style>
</head>
<body>

    <header>
        <h1>Soan Ganga Coal Mining <span class="highlight">Pvt. Ltd.</span></h1>
        <p>Strategic Partner of <span class="partner">NCC Pvt. Ltd.</span> | Magadh & Amrapali Operations</p>
    </header>

    <div class="container">
        <h2>Company Leadership</h2>
        <div class="leadership-grid">
            <div class="leader-card">
                <div class="leader-title">Company Owner / Managing Director</div>
                <div class="leader-name" id="display-owner">Loading...</div>
            </div>
            <div class="leader-card" style="border-left-color: #FF5E00;">
                <div class="leader-title">Company Co-Owner / Director</div>
                <div class="leader-name" id="display-coowner">Loading...</div>
            </div>
        </div>

        <h2>Live Operations</h2>
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-number" id="display-trucks">...</div>
                <div class="stat-label">Active Trucks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="display-employees">...</div>
                <div class="stat-label">Total Staff</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="display-revenue">...</div>
                <div class="stat-label">Project Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="display-guards">...</div>
                <div class="stat-label">Security Guards</div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ APNI GOOGLE SHEET ID YAHAN PASTE KAREIN
        const SHEET_ID = 'YOUR_GOOGLE_SHEET_ID_HERE'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchLiveSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                // Google Sheet ka JSON data clean karne ke liye
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = const SHEET_ID = '1BRRdTT4vjZDFlta_kWGCQZLVe29I0ggWWd3TmqWYTu4';
                // Data ko website par load karne ka logic
                let dataMap = {};
                rows.forEach(row => {
                    if (row.c[0] && row.c[1]) {
                        dataMap[row.c[0].v.toLowerCase().trim()] = row.c[1].v;
                    }
                });

                document.getElementById('display-owner').innerText = dataMap['owner'] || 'N/A';
                document.getElementById('display-coowner').innerText = dataMap['coowner'] || 'N/A';
                document.getElementById('display-trucks').innerText = dataMap['trucks'] || '0';
                document.getElementById('display-employees').innerText = dataMap['employees'] || '0';
                document.getElementById('display-revenue').innerText = dataMap['revenue'] || '₹0';
                document.getElementById('display-guards').innerText = dataMap['guards'] || '0';

            } catch (error) {
                console.error("Error loading data from Google Sheet:", error);
            }
        }

        window.onload = fetchLiveSheetData;
    </script>
</body>
</html>
